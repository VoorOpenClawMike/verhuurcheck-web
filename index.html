    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "@id": "https://verhuurcheck.nl/#app",
          "name": "Verhuurcheck.nl",
          "url": "https://verhuurcheck.nl",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web",
          "description": "Bereken de maximale huurprijs van uw woning conform de Wet Betaalbare Huur 2025.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "EUR",
            "description": "Gratis basisversie — 3 checks per maand"
          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://verhuurcheck.nl/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Wat zijn WWS-punten?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "WWS staat voor Woningwaarderingsstelsel. Dit puntensysteem bepaalt de kwaliteit en maximale huurprijs van een sociale huurwoning. Elk kenmerk — oppervlakte, energielabel, voorzieningen — levert punten op."
              }
            },
            {
              "@type": "Question",
              "name": "Voldoet de berekening aan de Wet Betaalbare Huur?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Ja. Verhuurcheck.nl berekent conform het WWS zoals van kracht per 1 juli 2024 inclusief de aanpassingen uit de Wet Betaalbare Huur (WBH). Verhuurders zijn wettelijk verplicht de maximale huurprijs te hanteren."
              }
            },
            {
              "@type": "Question",
              "name": "Is mijn woning sociaal of vrije sector?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Tot 144 punten valt een woning in de sociale sector (max. €879/mnd in 2025). Van 145–186 punten is het middensegment (max. €1.157/mnd). Boven 186 punten is de woning vrije sector."
              }
            }
          ]
        }
      ]
    }
    </script>
